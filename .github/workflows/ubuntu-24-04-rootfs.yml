name: Build Ubuntu 24.04 Rootfs

on:
  push:
    branches:
      - main
    paths:
      - 'iximiuz/rootfs/ubuntu/**'
      - '.github/workflows/ubuntu-24-04-rootfs.yml'
  pull_request:
    paths:
      - 'iximiuz/rootfs/ubuntu/**'
      - '.github/workflows/ubuntu-24-04-rootfs.yml'
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ghcr.io/${{ github.repository_owner }}/ubuntu-24-04-rootfs

jobs:
  build-and-push:
    name: Build & Push Ubuntu Rootfs
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3
        with:
          platforms: amd64,arm64

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE_NAME }}
          labels: |
            org.opencontainers.image.licenses=MIT
            org.opencontainers.image.url=https://github.com/ibtisam-iq/silver-stack
            org.opencontainers.image.source=https://github.com/ibtisam-iq/silver-stack
            org.opencontainers.image.vendor=Ibtisam IQ
            org.opencontainers.image.authors=Muhammad Ibtisam <contact@ibtisam-iq.com>
            org.opencontainers.image.documentation="https://blog.ibtisam-iq.com"
          tags: |
            type=raw,value=latest,enable={{is_default_branch}}
            type=sha,prefix=sha-,format=short
            type=raw,value={{date 'YYYY-MM-DD'}}

      - name: Build and push
        id: build-and-push
        uses: docker/build-push-action@v6
        with:
          context: ./iximiuz/rootfs/ubuntu
          file: ./iximiuz/rootfs/ubuntu/Dockerfile
          platforms: linux/amd64,linux/arm64
          load: false    # Don't load the image into the local Docker cache since we're pushing it
          push: ${{ github.event_name != 'pull_request' }} # Only push on non-PR events
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            USER=ibtisam
            ARKADE_BIN_DIR=/usr/local/bin
            BTOP_VERSION=1.4.4
            CFSSL_VERSION=1.6.5
            WEBSOCAT_VERSION=1.14.1
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Image digest
        run: echo "Pushed ${{ env.IMAGE_NAME }}@${{ steps.build-and-push.outputs.digest }}"
