#
# PURPOSE
# -------
# eksctl ClusterConfig for creating an EKS cluster on a KodeKloud AWS
# playground lab account.  Every field in this config is deliberately set
# to work within the SCP restrictions — nothing here is a default or a
# placeholder.  I confirmed each constraint the hard way, on a live session.
#
# WHY THIS FILE EXISTS
# --------------------
# KodeKloud lab SCPs enforce two hard restrictions that break the standard
# eksctl workflow:
#
#   1. iam:PassRole is allowed ONLY for roles named "eksClusterRole" or
#      "eksNodeRole".  I confirmed this via the IAM policy simulator —
#      any other name, including eksctl auto-generated names, returns
#      implicitDeny.
#
#   2. eks:CreateNodegroup is blocked unconditionally.  I ran the simulator
#      against all four methods — Console, eksctl, AWS CLI, Terraform — and
#      every one returns AccessDeniedException.  Managed node groups are
#      impossible on this platform.
#
# This config patches around both:
#
#   serviceRoleARN   → hardcoded to "eksClusterRole" (the whitelisted name).
#                      eksctl's default auto-generated name fails immediately.
#
#   withOIDC: false  → setting this to true triggers UpdateAddon on vpc-cni
#                      mid-create, which calls iam:PassRole and aborts the
#                      entire operation.  I hit this failure before finding
#                      the fix.  Associate OIDC separately after cluster is
#                      Active.
#
#   managedNodeGroups: []  → eksctl creates managed node groups via
#                            eks:CreateNodegroup (blocked).  Keep this empty.
#                            Use self-managed AL2023 nodes via CloudFormation.
#
#   autoModeConfig: false  → Auto Mode also triggers CreateNodegroup.  Disable.
#
#   authenticationMode: API_AND_CONFIG_MAP
#                      → Keeps both join paths available for self-managed nodes.
#                        Setting only "API" silently ignores aws-auth, which
#                        is the most common "nodes stuck Unauthorized" failure.
#                        I documented this trap in the full runbook.
#
# USAGE
# -----
#   # Step 0 — run kodekloud-eks-iam-roles.tf first (creates eksClusterRole)
#
#   # Step 1 — substitute the AWS account ID, then create the cluster
#   eksctl create cluster -f kodekloud-eks-cluster-eksctl.yaml
#
#   # Step 2 — associate OIDC provider AFTER the cluster is Active
#   eksctl utils associate-iam-oidc-provider \
#     --cluster ibtisam-iq-eks-cluster \
#     --region us-east-1 \
#     --approve
#
#   # Step 3 — provision self-managed worker nodes via the AL2023
#   #           CloudFormation template (Track B in the full runbook)
#
# FULL RUNBOOK
# ------------
# https://github.com/ibtisam-iq/runbook/blob/main/iac/terraform/provisioning/eks-on-kodekloud-aws-playground.md
# =============================================================================

apiVersion: eksctl.io/v1alpha5
kind: ClusterConfig

metadata:
  name: ibtisam-iq-eks-cluster
  region: us-east-1

iam:
  # Must be the exact SCP-whitelisted role name — any other name is denied.
  serviceRoleARN: arn:aws:iam::<account-id>:role/eksClusterRole

  # MUST be false during create — withOIDC: true triggers UpdateAddon on
  # vpc-cni, which calls iam:PassRole and fails the entire operation.
  # Run `eksctl utils associate-iam-oidc-provider` as a separate step after
  # the cluster is Active.
  withOIDC: false

# Keeps both node-join paths available for self-managed workers:
#   API_AND_CONFIG_MAP  → access entries AND aws-auth ConfigMap both work
#   API only            → aws-auth is silently ignored; nodes stay Unauthorized
accessConfig:
  authenticationMode: API_AND_CONFIG_MAP

# Declare core addons explicitly so eksctl does not attempt to attach IAM
# roles to them during cluster creation (which triggers iam:PassRole).
addons:
  - name: vpc-cni
    version: latest
  - name: kube-proxy
    version: latest
  - name: coredns
    version: latest

# MUST stay empty — eks:CreateNodegroup is blocked unconditionally by the SCP.
# Provision self-managed worker nodes via the AL2023 CloudFormation template.
managedNodeGroups: []

# MUST be disabled — Auto Mode also triggers CreateNodegroup.
autoModeConfig:
  enabled: false
