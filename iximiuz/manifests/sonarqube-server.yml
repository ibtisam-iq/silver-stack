kind: playground
title: SilverStack SonarQube Server
description: >
  Production-grade SonarQube 26.2 CE (LTA) on Ubuntu 24.04 - systemd-booted,
  PostgreSQL-backed, Nginx-proxied, Cloudflare-ready, zero setup required.
categories:
    - linux
    - ci-cd
    - containers
playground:
    networks:
        - name: local
          subnet: 172.16.0.0/24
    machines:
        - name: sonarqube-server
          users:
            - name: root
            - name: ibtisam
              default: true
          drives:
            - source: oci://ghcr.io/ibtisam-iq/sonarqube-rootfs:latest
              format: ext4
              mount: /
              size: 50GiB
          network:
            interfaces:
                - network: local
          resources:
            cpuCount: 4
            ramSize: 10GiB
    tabs:
        - kind: ide
          name: IDE
          machine: sonarqube-server
        - kind: terminal
          name: ibtisam-iq
          machine: sonarqube-server
        - kind: http-port
          name: "SonarQube UI"
          machine: sonarqube-server
          number: 80
          access: public
    accessControl:
        canList:
            - anyone
        canRead:
            - anyone
        canStart:
            - anyone
