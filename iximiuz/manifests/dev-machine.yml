kind: playground
title: SilverStack Dev Machine
description: SilverStack Dev Machine - Ubuntu 24.04 server
categories:
    - linux
playground:
    networks:
        - name: local
          subnet: 172.16.0.0/24
    machines:
        - name: dev-machine
          users:
            - name: root
            - name: ibtisam
              default: true
          drives:
            - source: oci://ghcr.io/ibtisam-iq/dev-machine-rootfs:latest
              mount: /
              size: 50GiB
          network:
            interfaces:
                - network: local
          resources:
            cpuCount: 4
            ramSize: 8GiB
    tabs:
        - kind: ide
          name: IDE
          machine: dev-machine
        - kind: terminal
          name: ibtisam-iq
          machine: dev-machine
    accessControl:
        canList:
            - anyone
        canRead:
            - anyone
        canStart:
            - anyone
