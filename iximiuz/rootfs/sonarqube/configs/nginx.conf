# ========================================================
# Nginx Reverse Proxy Configuration — SonarQube
# ========================================================
# Author:     Muhammad Ibtisam Iqbal
# Repository: https://github.com/ibtisam-iq/silver-stack
#
# Based on SonarQube reverse proxy documentation:
# https://docs.sonarsource.com/sonarqube/latest/setup-and-upgrade/deploy-on-kubernetes/using-helm-chart/
# ========================================================

upstream sonarqube {
    server 127.0.0.1:__SONARQUBE_PORT__ fail_timeout=0;
    keepalive 32;
}

server {
    listen 80 default_server;
    server_name _;

    access_log /var/log/nginx/sonarqube-access.log;
    error_log  /var/log/nginx/sonarqube-error.log;

    client_max_body_size 64M;

    location / {
        proxy_pass         http://sonarqube;
        proxy_redirect     off;

        proxy_set_header   Host                $host;
        proxy_set_header   X-Real-IP           $remote_addr;
        proxy_set_header   X-Forwarded-For     $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto   $scheme;
        proxy_set_header   X-Forwarded-Host    $host;
        proxy_set_header   X-Forwarded-Port    $server_port;

        proxy_http_version 1.1;
        proxy_set_header   Upgrade             $http_upgrade;
        proxy_set_header   Connection          "upgrade";

        proxy_connect_timeout      150s;
        proxy_send_timeout         300s;
        proxy_read_timeout         300s;

        proxy_buffering            off;
        proxy_request_buffering    off;
    }

    # Health check endpoint
    location /health {
        access_log off;
        return 200 "healthy\n";
        add_header Content-Type text/plain;
    }
}
