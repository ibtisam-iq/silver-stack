[Service]
# Override guacd default bind address from ::1 (IPv6 loopback) to 0.0.0.0
# so it accepts both IPv4 (127.0.0.1) and IPv6 (::1) connections.
#
# Why: In Docker, 'localhost' in guacamole.properties resolves to 127.0.0.1
# (IPv4). guacd defaults to ::1 (IPv6 only), causing 'Connection refused'
# from Tomcat. On iximiuz block devices it worked by accident because
# 'localhost' resolved to ::1. Binding 0.0.0.0 is correct in both cases.
#
# The empty ExecStart= clears the inherited value before setting the new one.
ExecStart=
ExecStart=/usr/local/sbin/guacd -f -b 0.0.0.0 -l 4822
