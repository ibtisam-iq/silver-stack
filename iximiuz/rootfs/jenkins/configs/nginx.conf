# ========================================================
# Nginx Reverse Proxy Configuration — Jenkins LTS
# ========================================================
# Author:     Muhammad Ibtisam Iqbal
# Created:    February 2026
# Repository: https://github.com/ibtisam-iq/SilverStack
#
# Based on official Jenkins reverse proxy sample:
# https://www.jenkins.io/doc/book/system-administration/reverse-proxy-configuration-nginx/
# ========================================================

map $http_upgrade $connection_upgrade {
    default upgrade;
    ''      "";
}

upstream jenkins {
    server 127.0.0.1:__JENKINS_PORT__ fail_timeout=0;
    keepalive 32;
}

server {
    listen 80 default_server;
    # server_name jenkins.ibtisam-iq.com localhost;
    server_name _;

    root /var/lib/jenkins/war;

    access_log /var/log/nginx/jenkins-access.log;
    error_log  /var/log/nginx/jenkins-error.log;

    ignore_invalid_headers off;

    # Rewrite legacy /static/ paths
    location ~ "^/static/[0-9a-f]{8}/(.*)$" {
        rewrite "^/static/[0-9a-f]{8}/(.*)" /$1 last;
    }

    # User content (avatars, custom CSS, etc.)
    location /userContent/ {
        root /var/lib/jenkins/;
        if (!-f $request_filename) {
            rewrite (.*) /$1 last;
        }
        sendfile on;
    }

    # Main proxy
    location / {
        proxy_pass         http://jenkins;
        proxy_redirect     off;

        proxy_set_header   Host                $host;
        proxy_set_header   X-Real-IP           $remote_addr;
        proxy_set_header   X-Forwarded-For     $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto   $scheme;
        proxy_set_header   X-Forwarded-Host    $host;
        proxy_set_header   X-Forwarded-Port    $server_port;

        proxy_http_version 1.1;
        proxy_set_header   Upgrade             $http_upgrade;
        proxy_set_header   Connection          $connection_upgrade;

        proxy_connect_timeout      150s;
        proxy_send_timeout         100s;
        proxy_read_timeout         100s;

        proxy_buffering            off;
        proxy_request_buffering    off;
        proxy_max_temp_file_size   0;
    }

    # Jenkins CLI
    location /cli {
        proxy_pass         http://jenkins/cli;
        proxy_redirect     off;
        proxy_http_version 1.1;
        proxy_set_header   Host                $host;
        proxy_set_header   X-Real-IP           $remote_addr;
        proxy_set_header   X-Forwarded-For     $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto   $scheme;
        proxy_set_header   Upgrade             $http_upgrade;
        proxy_set_header   Connection          $connection_upgrade;
    }

    # JNLP agent jars
    location /jnlpJars/ {
        proxy_pass         http://jenkins/jnlpJars/;
        proxy_redirect     off;
        proxy_http_version 1.1;
        proxy_set_header   Host                $host;
        proxy_set_header   X-Real-IP           $remote_addr;
        proxy_set_header   X-Forwarded-For     $proxy_add_x_forwarded_for;
    }

    # Static assets with browser caching
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
        proxy_pass http://jenkins;
        expires 1d;
        add_header Cache-Control          "public, immutable"              always;
        add_header X-Frame-Options        "SAMEORIGIN"                     always;
        add_header X-Content-Type-Options "nosniff"                        always;
        add_header X-XSS-Protection       "1; mode=block"                  always;
        add_header Referrer-Policy        "strict-origin-when-cross-origin" always;
    }

    # Health check
    location /health {
        access_log off;
        return 200 "healthy\n";
        add_header Content-Type text/plain;
    }
}
